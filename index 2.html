<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HealthLedger AI — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:    #090D14;
      --mint:  #00E5B0;
      --text:  #E8EDF5;
      --dim:   #5A6A7A;
      --serif: 'DM Serif Display', serif;
      --mono:  'DM Mono', monospace;
      --sans:  'DM Sans', sans-serif;
    }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 700px; height: 500px;
      background: radial-gradient(ellipse, rgba(0,229,176,0.06) 0%, transparent 65%);
      pointer-events: none;
    }
    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 520px;
      width: 100%;
      animation: fadeUp 0.8s ease both;
    }
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 3.5rem;
    }
    .logo-dot {
      width: 9px; height: 9px;
      background: var(--mint);
      border-radius: 50%;
      box-shadow: 0 0 12px var(--mint);
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 10px var(--mint); }
      50%       { opacity: 0.5; box-shadow: 0 0 22px var(--mint); }
    }
    .logo-text {
      font-family: var(--mono);
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--text);
    }
    h1 {
      font-family: var(--serif);
      font-size: clamp(2.2rem, 5vw, 3.2rem);
      font-weight: 400;
      line-height: 1.15;
      margin-bottom: 1.25rem;
    }
    h1 em {
      font-style: italic;
      color: var(--mint);
    }
    .sub {
      font-size: 0.95rem;
      color: var(--dim);
      font-weight: 300;
      line-height: 1.7;
      margin-bottom: 3rem;
    }
    .divider {
      width: 40px;
      height: 1px;
      background: rgba(0,229,176,0.3);
      margin: 0 auto 3rem;
    }
    .contact-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 0.6rem;
      display: block;
    }
    .contact-email {
      font-family: var(--mono);
      font-size: 0.92rem;
      color: var(--mint);
      text-decoration: none;
      border-bottom: 1px solid rgba(0,229,176,0.25);
      padding-bottom: 2px;
      transition: border-color 0.2s, color 0.2s;
    }
    .contact-email:hover {
      color: #fff;
      border-color: rgba(255,255,255,0.3);
    }
    .footer {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--dim);
      letter-spacing: 0.08em;
      z-index: 1;
      white-space: nowrap;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 480px) {
      h1 { font-size: 2rem; }
      .sub { font-size: 0.88rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <span class="logo-dot"></span>
      <span class="logo-text">HealthLedger AI</span>
    </div>
    <h1>
      Something important<br>
      is being <em>built.</em>
    </h1>
    <p class="sub">
      AI-powered accounting compliance for healthcare.<br>
      Launching soon.
    </p>
    <div class="divider"></div>
    <span class="contact-label">Get in touch</span><br>
    <a class="contact-email" href="mailto:info@healthledgerai.com">
      info@healthledgerai.com
    </a>
  </div>
  <div class="footer">© 2026 HealthLedger AI &nbsp;·&nbsp; All rights reserved</div>
</body>
</html>
